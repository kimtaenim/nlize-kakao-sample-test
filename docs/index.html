<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>선물하기 랭킹 트래커</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; background: #f7f7f9; color: #222; }
  header { background: #fff; border-bottom: 1px solid #e5e5ea; padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; position: sticky; top: 0; z-index: 10; }
  h1 { font-size: 17px; margin: 0 12px 0 0; }
  .tabs button { border: 1px solid #ddd; background: #fff; padding: 6px 14px; border-radius: 16px; cursor: pointer; font-size: 13px; margin-right: 4px; }
  .tabs button.on { background: #191919; color: #ffe812; border-color: #191919; }
  select, .btn { padding: 6px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; text-decoration: none; color: #222; }
  .btn.primary { background: #ffe812; border-color: #f5d900; font-weight: 700; }
  main { max-width: 1120px; margin: 16px auto; padding: 0 12px; }
  .meta { font-size: 12px; color: #888; margin: 4px 0 12px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .card { background: #fff; border: 1px solid #e5e5ea; border-radius: 10px; padding: 14px; }
  .card.wide { grid-column: 1 / -1; }
  .card h2 { font-size: 14px; margin: 0 0 10px; }
  .card .sub { font-size: 11px; color: #999; font-weight: 400; margin-left: 6px; }
  .chartbox { position: relative; height: 320px; }
  .chartbox.tall { height: 380px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e5ea; font-size: 13px; }
  th, td { padding: 8px 10px; border-bottom: 1px solid #f0f0f2; text-align: left; white-space: nowrap; }
  th { background: #fafafa; font-size: 12px; color: #666; }
  td.name { white-space: normal; min-width: 220px; }
  td.name a { color: #222; text-decoration: none; }
  td.name a:hover { text-decoration: underline; }
  .num { text-align: right; }
  .up { color: #e03131; font-weight: 600; }
  .down { color: #1971c2; font-weight: 600; }
  .same { color: #bbb; }
  .new { background: #ffe812; color: #191919; font-size: 11px; padding: 1px 6px; border-radius: 8px; font-weight: 700; }
  .rank { font-weight: 700; font-size: 14px; text-align: center; }
  .brand { color: #888; font-size: 12px; }
  .wtable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .wtable th, .wtable td { padding: 7px 10px; border-bottom: 1px solid #f0f0f2; text-align: left; white-space: nowrap; }
  .wtable th { background: #fafafa; font-size: 12px; color: #666; }
  tr.mainbrand { background: #fffbe0; font-weight: 600; }
  details.brand { margin: 2px 0; }
  details.brand summary { cursor: pointer; font-size: 12px; color: #888; padding: 4px 10px; }
  .scrollx { overflow-x: auto; }
  footer { max-width: 1120px; margin: 20px auto; padding: 0 12px 30px; font-size: 11.5px; color: #aaa; }
  @media (max-width: 800px) { .cards { grid-template-columns: 1fr; } .chartbox { height: 260px; } }
</style>
</head>
<body>
<header>
  <h1>🎁 선물하기 랭킹</h1>
  <span class="tabs" id="tabs"></span>
  <select id="snapSel" title="표 스냅샷 시각"></select>
  <a class="btn primary" id="runLink" href="#" target="_blank">🔄 수동 수집</a>
  <span class="meta" id="status"></span>
</header>
<main>
  <div class="meta" id="meta"></div>

  <div class="cards">
    <div class="card wide">
      <h2>📈 순위 변동 추이 <span class="sub">최근 7일 · 현재 상위 10개 상품 · 범례 클릭으로 표시/숨김</span></h2>
      <div class="chartbox tall"><canvas id="rankChart"></canvas></div>
    </div>
    <div class="card">
      <h2>🔥 위시 증가 TOP 10 <span class="sub">최근 7일 동안 위시 수 증가량</span></h2>
      <div class="chartbox"><canvas id="wishChart"></canvas></div>
    </div>
    <div class="card">
      <h2>💰 가격대 분포 <span class="sub">현재 수집 상품 기준</span></h2>
      <div class="chartbox"><canvas id="priceChart"></canvas></div>
    </div>
    <div class="card wide">
      <h2>⭐ 관심 브랜드 — 네추럴라이즈 &amp; 경쟁 <span class="sub" id="watchMeta"></span></h2>
      <div id="watchBox" class="scrollx">데이터 로딩 중…</div>
    </div>
  </div>

  <div class="scrollx">
  <table>
    <thead><tr>
      <th>순위</th><th>변동<br><span style="font-weight:400">(직전)</span></th><th>변동<br><span style="font-weight:400">(24h)</span></th>
      <th>상품</th><th>가격</th><th>위시</th><th>위시 Δ24h</th><th>최근주문</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>
</main>
<footer>
  GitHub Actions가 매시간 자동 수집 · 데이터 출처: gift.kakao.com (비공식) · AI 브리핑은 로컬 트래커(gift-rank-tracker)에서 사용 가능
</footer>
<script>
const REPO_ACTIONS = 'https://github.com/kimtaenim/nlize-kakao-sample-test/actions/workflows/collect.yml';
let latest = null, curKey = null, series = null;
let curSnap = null, prevSnap = null, base24 = null;
let daySnapsCache = {}; // key -> 과거 스냅샷 배열 (드롭다운으로 과거를 볼 때만 로드)
let charts = {};
const $ = (id) => document.getElementById(id);
const fmt = (n) => n == null ? '-' : n.toLocaleString('ko-KR');
const cut = (s, n) => s.length > n ? s.slice(0, n) + '…' : s;
const timeLabel = (ts) => new Date(ts).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
const PALETTE = ['#e03131','#1971c2','#2f9e44','#f08c00','#9c36b5','#0c8599','#e8590c','#5f3dc4','#c2255c','#495057'];

async function loadLatest() {
  const r = await fetch('data/latest.json?t=' + Date.now());
  if (!r.ok) throw new Error('latest.json 없음 — 첫 수집이 아직 실행되지 않았을 수 있어요');
  latest = await r.json();
}

function selectTarget(key) {
  curKey = key;
  document.querySelectorAll('.tabs button').forEach((b) => b.classList.toggle('on', b.dataset.key === key));
  const t = latest.table[key];
  curSnap = t.snap; prevSnap = t.prev; base24 = t.base24;
  series = latest.series[key];
  $('snapSel').innerHTML = t.times.map((x, i) => `<option value="${x}"${i === t.times.length - 1 ? ' selected' : ''}>${timeLabel(x)}</option>`).join('');
  renderTable();
  renderCharts();
}

// 과거 스냅샷 선택 시: 해당 카테고리의 최근 2일치 파일을 그때 가서 로드
async function selectSnapshot(ts) {
  const t = latest.table[curKey];
  if (ts === t.times[t.times.length - 1]) { selectTarget(curKey); return; }
  if (!daySnapsCache[curKey]) {
    $('status').textContent = '과거 데이터 로딩…';
    const days = (latest.days[curKey] ?? []).slice(-2);
    const snaps = [];
    for (const d of days) {
      const r = await fetch(`data/${curKey}/${d}.jsonl?t=` + Date.now());
      if (r.ok) {
        const text = await r.text();
        snaps.push(...text.split('\n').filter(Boolean).map((l) => JSON.parse(l)));
      }
    }
    snaps.sort((a, b) => a.ts.localeCompare(b.ts));
    daySnapsCache[curKey] = snaps;
    $('status').textContent = '';
  }
  const snaps = daySnapsCache[curKey];
  const idx = snaps.findIndex((s) => s.ts === ts);
  if (idx < 0) return;
  curSnap = snaps[idx];
  prevSnap = idx > 0 ? snaps[idx - 1] : null;
  const goal = new Date(curSnap.ts).getTime() - 24 * 3600e3;
  base24 = null; let bd = 3 * 3600e3;
  for (const s of snaps) { const d = Math.abs(new Date(s.ts).getTime() - goal); if (d < bd) { bd = d; base24 = s; } }
  renderTable();
}

function delta(cur, base, id) {
  if (!base) return '<span class="same">-</span>';
  const prev = base.products.find((p) => p.id === id);
  if (!prev) return '<span class="new">NEW</span>';
  const d = prev.rank - cur;
  if (d > 0) return `<span class="up">▲${d}</span>`;
  if (d < 0) return `<span class="down">▼${-d}</span>`;
  return '<span class="same">–</span>';
}

function renderTable() {
  if (!curSnap) { $('tbody').innerHTML = '<tr><td colspan="8">데이터 없음 — 첫 수집을 기다리는 중</td></tr>'; return; }
  const snap = curSnap, prev = prevSnap, day = base24;
  $('meta').textContent = `수집 ${timeLabel(snap.ts)} · 서버 랭킹 갱신 ${snap.updatedAt ?? '?'} (KST) · ${snap.products.length}개 · 직전 비교: ${prev ? timeLabel(prev.ts) : '없음'} · 24h 비교: ${day ? timeLabel(day.ts) : '없음'}`;
  $('tbody').innerHTML = snap.products.map((p) => {
    const wish24 = day?.products.find((q) => q.id === p.id)?.wish;
    const dw = (wish24 != null && p.wish != null) ? p.wish - wish24 : null;
    return `<tr>
      <td class="rank">${p.rank}</td>
      <td>${delta(p.rank, prev, p.id)}</td>
      <td>${delta(p.rank, day, p.id)}</td>
      <td class="name"><a href="https://gift.kakao.com/product/${p.id}" target="_blank">${p.name}</a><br><span class="brand">${p.brand}</span></td>
      <td class="num">${fmt(p.price)}원</td>
      <td class="num">${fmt(p.wish)}</td>
      <td class="num">${dw == null ? '-' : (dw > 0 ? '<span class="up">+' + fmt(dw) + '</span>' : dw < 0 ? '<span class="down">' + fmt(dw) + '</span>' : '0')}</td>
      <td class="num">${fmt(p.order)}</td>
    </tr>`;
  }).join('');
}

function makeChart(id, config) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart($(id), config);
}

function renderCharts() {
  if (!series || !series.times.length) return;
  const labels = series.times.map(timeLabel);

  makeChart('rankChart', {
    type: 'line',
    data: {
      labels,
      datasets: series.products.slice(0, 10).map((p, i) => ({
        label: cut(p.name, 16),
        data: p.ranks,
        borderColor: PALETTE[i % PALETTE.length],
        backgroundColor: PALETTE[i % PALETTE.length],
        borderWidth: 2, pointRadius: 2, tension: 0.25, spanGaps: false,
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { reverse: true, min: 1, ticks: { stepSize: 1 }, title: { display: true, text: '순위' } },
        x: { ticks: { maxTicksLimit: 12, font: { size: 10 } } },
      },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } },
        tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${c.parsed.y}위` } },
      },
    },
  });

  const gains = series.products.map((p) => {
    const ws = p.wishes.filter((w) => w != null);
    return { name: p.name, gain: ws.length >= 2 ? ws[ws.length - 1] - ws[0] : 0 };
  }).filter((g) => g.gain > 0).sort((a, b) => b.gain - a.gain).slice(0, 10);
  makeChart('wishChart', {
    type: 'bar',
    data: {
      labels: gains.map((g) => cut(g.name, 18)),
      datasets: [{ data: gains.map((g) => g.gain), backgroundColor: '#e03131' }],
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      scales: { x: { ticks: { callback: (v) => fmt(v) } }, y: { ticks: { font: { size: 11 } } } },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => `+${fmt(c.parsed.x)} 위시` } } },
    },
  });

  const buckets = [
    { label: '~1만', max: 10000 }, { label: '1~3만', max: 30000 }, { label: '3~5만', max: 50000 },
    { label: '5~10만', max: 100000 }, { label: '10~30만', max: 300000 }, { label: '30만~', max: Infinity },
  ];
  const counts = buckets.map(() => 0);
  if (curSnap) for (const p of curSnap.products) {
    if (p.price == null) continue;
    counts[buckets.findIndex((b) => p.price < b.max)]++;
  }
  makeChart('priceChart', {
    type: 'bar',
    data: { labels: buckets.map((b) => b.label), datasets: [{ data: counts, backgroundColor: '#f5d900', borderColor: '#d9c000', borderWidth: 1 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { title: { display: true, text: '상품 수' } } },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => `${c.parsed.y}개` } } },
    },
  });
}

function renderWatch() {
  const w = latest.watch;
  if (!w || w.error) { $('watchBox').textContent = '데이터 없음'; return; }
  $('watchMeta').textContent = `수집 ${timeLabel(w.ts)} · 24h 비교: ${w.compared24 ? timeLabel(w.compared24) : '없음'}` +
    (w.thresholds ? ` · 건강식품·영양제 100위 진입선(위시): ${fmt(w.thresholds.r100)}` : '');
  const dw = (d) => d == null ? '-' : (d > 0 ? `<span class="up">+${fmt(d)}</span>` : d < 0 ? `<span class="down">${fmt(d)}</span>` : '0');
  let html = `<table class="wtable"><thead><tr>
    <th>브랜드</th><th>상품 수</th><th>랭킹 진입<br><span style="font-weight:400">(300위 내)</span></th><th>최고 순위</th><th>총 위시</th><th>위시 Δ24h</th><th>대표 상품 (위시)</th>
  </tr></thead><tbody>`;
  for (const b of w.brands) {
    const top = b.products[0];
    html += `<tr class="${b.main ? 'mainbrand' : ''}">
      <td>${b.main ? '⭐ ' : ''}${b.name}</td>
      <td class="num">${b.productCount}</td>
      <td class="num">${b.rankedCount}개</td>
      <td>${b.bestRank ? `<b>${b.bestRank}위</b> <span class="brand">${b.bestRankTarget}</span>` : '<span class="same">순위권 밖</span>'}</td>
      <td class="num">${fmt(b.totalWish)}</td>
      <td class="num">${dw(b.wishDelta24)}</td>
      <td class="name">${top ? `<a href="https://gift.kakao.com/product/${top.id}" target="_blank">${top.name.slice(0, 34)}</a> <span class="brand">(${fmt(top.wish)})</span>` : '-'}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  for (const b of w.brands) {
    html += `<details class="brand"${b.main ? ' open' : ''}><summary>${b.main ? '⭐ ' : ''}${b.name} 상품별 보기 (${b.productCount}개)</summary>
      <table class="wtable"><thead><tr><th>상품</th><th>가격</th><th>위시</th><th>위시 Δ24h</th><th>리뷰</th><th>순위</th></tr></thead><tbody>` +
      b.products.map((p) => `<tr>
        <td class="name"><a href="https://gift.kakao.com/product/${p.id}" target="_blank">${p.name.slice(0, 48)}</a></td>
        <td class="num">${fmt(p.price)}원</td>
        <td class="num">${fmt(p.wish)}</td>
        <td class="num">${dw(p.wish != null && p.wish24 != null ? p.wish - p.wish24 : null)}</td>
        <td class="num">${fmt(p.review)}</td>
        <td>${p.rank ? `${p.rank}위 <span class="brand">${p.rankTarget}</span>` : '<span class="same">-</span>'}</td>
      </tr>`).join('') + '</tbody></table></details>';
  }
  $('watchBox').innerHTML = html;
}

$('snapSel').addEventListener('change', (e) => selectSnapshot(e.target.value));
$('runLink').href = REPO_ACTIONS;

(async () => {
  try {
    await loadLatest();
  } catch (e) {
    $('meta').textContent = e.message;
    return;
  }
  $('tabs').innerHTML = latest.targets.map((t) => `<button data-key="${t.key}">${t.label}</button>`).join('');
  document.querySelectorAll('.tabs button').forEach((b) => b.addEventListener('click', () => selectTarget(b.dataset.key)));
  selectTarget(latest.targets[0].key);
  renderWatch();
  // 10분마다 새 데이터 확인 (Pages 캐시 감안)
  let lastGen = latest.generatedAt;
  setInterval(async () => {
    try {
      await loadLatest();
      if (latest.generatedAt !== lastGen) {
        lastGen = latest.generatedAt;
        daySnapsCache = {};
        selectTarget(curKey);
        renderWatch();
      }
    } catch {}
  }, 600000);
})();
</script>
</body>
</html>
